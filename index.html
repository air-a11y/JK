    <script>
        // --- 音效合成器 (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'jump') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.15);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            } else if (type === 'land') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.linearRampToValueAtTime(40, now + 0.1);
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'bonk') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(350, now);
                osc.frequency.setValueAtTime(180, now + 0.05);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.12);
                osc.start(now);
                osc.stop(now + 0.12);
            } else if (type === 'fall') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(80, now + 0.4);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            } else if (type === 'victory') {
                const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50];
                notes.forEach((freq, idx) => {
                    const noteOsc = audioCtx.createOscillator();
                    const noteGain = noteOsc.createGain();
                    noteOsc.connect(noteGain);
                    noteGain.connect(audioCtx.destination);
                    noteOsc.type = 'sine';
                    noteOsc.frequency.setValueAtTime(freq, now + idx * 0.1);
                    noteGain.gain.setValueAtTime(0.25, now + idx * 0.1);
                    noteGain.gain.linearRampToValueAtTime(0.01, now + idx * 0.1 + 0.25);
                    noteOsc.start(now + idx * 0.1);
                    noteOsc.stop(now + idx * 0.1 + 0.25);
                });
            } else if (type === 'save') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.setValueAtTime(880, now + 0.05);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            } else if (type === 'load') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, now);
                osc.frequency.setValueAtTime(440, now + 0.05);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            }
        }

        // --- 物理常數配置 ---

            [

        let currentScreenIndex = 0;

        // 寶藏 (配合第10關終點平台，精確放置在中央 x: 220)
        const treasure = {
            x: 220,
            y: 280,
            w: 40,
            h: 40,
            isCollected: false
        };

        // --- 核心風力動態計算函數 ---
        function getWindForce() {
            // 第 6 關 (index 5): 向左吹
            if (currentScreenIndex === 5) {
                return { x: PHYSICS.windForceAir, y: 0, dir: 'left' };
            }
            // 第 7 關 (index 6): 反方向向右吹 ➡️
            if (currentScreenIndex === 6) {
                return { x: -PHYSICS.windForceAir, y: 0, dir: 'right' };
            }
            // 第 8、9 關 (index 7, 8): 每 5 秒輪替左右雙向風 🔄
            if (currentScreenIndex === 7 || currentScreenIndex === 8) {
                let cycle = Math.floor(Date.now() / 5000) % 2;
                if (cycle === 0) {
                    return { x: PHYSICS.windForceAir, y: 0, dir: 'left' };
                } else {
                    return { x: -PHYSICS.windForceAir, y: 0, dir: 'right' };
                }
            }
            // 第 10 關 (index 9): 上升氣流 ⬆️
            if (currentScreenIndex === 9) {
                return { x: 0, y: -0.16, dir: 'up' }; // 溫和而穩定的向上升力
            }
            return { x: 0, y: 0, dir: 'none' };
        }

        function isWindActive() {
            let wind = getWindForce();
            return wind.x !== 0 || wind.y !== 0;
        }

        // 背景粒子效果
        const particles = [];
        function createParticles() {
            if (particles.length < 40) {
                const wind = getWindForce();
                particles.push({
                    x: wind.dir === 'left' ? canvas.width + 10 : (wind.dir === 'right' ? -10 : Math.random() * canvas.width),
                    y: wind.dir === 'up' ? canvas.height + 10 : Math.random() * canvas.height,
                    vx: 0,
                    vy: 0,
                    size: wind.dir !== 'none' ? Math.random() * 4 + 1 : Math.random() * 2 + 1, 
                    alpha: Math.random() * 0.6 + 0.2,
                    isWindLine: wind.dir !== 'none'
                });
            }
        }

        // 冰雪花碎粒子 
        const iceParticles = [];
        function createIceSplash(x, y, isBraking = false) {
            const count = isBraking ? 4 : 2; 
            for (let i = 0; i < count; i++) {
                iceParticles.push({
                    x: x + Math.random() * player.w,
                    y: y + player.h - 2,
                    vx: (Math.random() - 0.5) * (isBraking ? 4 : 2),
                    vy: -Math.random() * (isBraking ? 2.5 : 1.5),
                    size: Math.random() * (isBraking ? 3 : 2) + 1,
                    life: (isBraking ? 30 : 20) + Math.random() * 20
                });
            }
        }

        // --- HUD Toast 浮出提示系統 ---
        let toastTimeout;
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('hidden', 'opacity-0');
            toast.classList.add('opacity-100');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0');
                setTimeout(() => toast.classList.add('hidden'), 300);
            }, 1500);
        }

        // --- 沙盒與作弊功能實作 ---
        function quickSave() {
            if (isGameFinished) return;
            savedState = {
                x: player.x,
                y: player.y,
                vx: player.vx,
                vy: player.vy,
                facing: player.facing,
                onIce: player.onIce,
                isGrounded: player.isGrounded,
                currentScreenIndex: currentScreenIndex
            };
            
            const btnLoad = document.getElementById('btn-load');
            btnLoad.removeAttribute('disabled');
            btnLoad.className = "flex-1 py-1.5 bg-cyan-600 hover:bg-cyan-500 rounded text-center text-white font-bold transition-all active:scale-95 flex items-center justify-center gap-1";
            
            playSound('save');
            showToast("💾 當前位置已儲存！");
        }

        function quickLoad() {
            if (isGameFinished || !savedState) return;
            
            player.x = savedState.x;
            player.y = savedState.y;
            player.vx = savedState.vx;
            player.vy = savedState.vy;
            player.facing = savedState.facing;
            player.onIce = savedState.onIce;
            player.isGrounded = savedState.isGrounded;
            player.isCharging = false;
            player.chargeAmount = 0;
            currentScreenIndex = savedState.currentScreenIndex;
            
            updateUIFloor();
            playSound('load');
            showToast("⏳ 已載入存檔點位置！");
        }

        document.getElementById('btn-save').addEventListener('click', quickSave);
        document.getElementById('btn-load').addEventListener('click', quickLoad);

        // --- 鍵盤監聽事件 (已完全清除 N 鍵與 btn-skip 相關邏輯) ---
        window.addEventListener('keydown', (e) => {
            if (isGameFinished) return;
            if (['ArrowLeft', 'KeyA'].includes(e.code)) keys.left = true;
            if (['ArrowRight', 'KeyD'].includes(e.code)) keys.right = true;
            if (['ArrowDown', 'KeyS'].includes(e.code)) {
                e.preventDefault();
                keys.down = true;
            }
            if (e.code === 'Space') {
                e.preventDefault(); 
                keys.space = true;
            }
            
            if (e.code === 'KeyK') quickSave();   
            if (e.code === 'KeyL') quickLoad();   
        });

        window.addEventListener('keyup', (e) => {
            if (['ArrowLeft', 'KeyA'].includes(e.code)) keys.left = false;
            if (['ArrowRight', 'KeyD'].includes(e.code)) keys.right = false;
            if (['ArrowDown', 'KeyS'].includes(e.code)) keys.down = false;
            if (e.code === 'Space') {
                keys.space = false;
            }
        });

        // --- 手機按鍵監聽事件 ---
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');
        const btnDown = document.getElementById('btn-down');
        const btnJump = document.getElementById('btn-jump');

        btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); mobileLeft = true; });
        btnLeft.addEventListener('touchend', () => mobileLeft = false);
        btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); mobileRight = true; });
        btnRight.addEventListener('touchend', () => mobileRight = false);
        
        btnDown.addEventListener('touchstart', (e) => { e.preventDefault(); mobileDown = true; });
        btnDown.addEventListener('touchend', () => mobileDown = false);
        
        btnJump.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            mobileCharging = true; 
        });
        btnJump.addEventListener('touchend', () => { 
            mobileCharging = false; 
        });

        window.addEventListener('contextmenu', e => e.preventDefault());

        // --- 物理與撞擊偵測 ---
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.w &&
                   rect1.x + rect1.w > rect2.x &&
                   rect1.y < rect2.y + rect2.h &&
                   rect1.y + rect1.h > rect2.y;
        }

        function updatePhysics() {
            if (isGameFinished) return;

            const isMovingLeft = keys.left || mobileLeft;
            const isMovingRight = keys.right || mobileRight;
            const isPressingCharge = keys.space || mobileCharging;
            const isBraking = keys.down || mobileDown;

            // 1. 地面移動與「冰面滑溜」物理
            if (player.isGrounded) {
                if (isBraking) {
                    player.vx *= 0.5; 
                    if (Math.abs(player.vx) > 0.1) {
                        createIceSplash(player.x, player.y, true);
                    }
                } else if (player.onIce) {
                    if (isMovingLeft && !player.isCharging) {
                        player.vx = Math.max(-player.speed, player.vx - PHYSICS.iceAcceleration);
                        player.facing = 'left';
                    } else if (isMovingRight && !player.isCharging) {
                        player.vx = Math.min(player.speed, player.vx + PHYSICS.iceAcceleration);
                        player.facing = 'right';
                    } else {
                        player.vx *= PHYSICS.iceFriction;
                    }

                    if (Math.abs(player.vx) > 0.4) {
                        createIceSplash(player.x, player.y);
                    }
                } else {
                    if (isMovingLeft && !player.isCharging) {
                        player.vx = -player.speed;
                        player.facing = 'left';
                    } else if (isMovingRight && !player.isCharging) {
                        player.vx = player.speed;
                        player.facing = 'right';
                    } else {
                        player.vx = 0;
                    }
                }
            }

            // 2. 蓄力跳躍機制
            if (player.isGrounded) {
                if (isPressingCharge) {
                    player.isCharging = true;
                    
                    if (!player.onIce) {
                        player.vx = 0; 
                    } else {
                        const slideFriction = isBraking ? 0.70 : PHYSICS.iceFriction;
                        player.vx *= slideFriction; 
                        createIceSplash(player.x, player.y, isBraking);
                    }
                    player.chargeAmount = Math.min(player.maxCharge, player.chargeAmount + player.chargeSpeed);
                } else if (player.isCharging) {
                    const chargeRatio = player.chargeAmount / player.maxCharge;
                    
                    // 垂直跳躍力
                    player.vy = -(PHYSICS.minJumpY + chargeRatio * (PHYSICS.maxJumpY - PHYSICS.minJumpY));
                    
                    // 水平跳躍力
                    let bonusX = player.onIce ? player.vx * 0.8 : 0;

                    if (isMovingLeft) {
                        player.vx = -(PHYSICS.minJumpX + chargeRatio * (PHYSICS.maxJumpX - PHYSICS.minJumpX)) + bonusX;
                        player.facing = 'left';
                    } else if (isMovingRight) {
                        player.vx = (PHYSICS.minJumpX + chargeRatio * (PHYSICS.maxJumpX - PHYSICS.minJumpX)) + bonusX;
                        player.facing = 'right';
                    } else {
                        player.vx = bonusX; 
                    }

                    player.isGrounded = false;
                    player.isCharging = false;
                    player.chargeAmount = 0;
                    totalJumps++;
                    document.getElementById('ui-jumps').innerText = totalJumps;
                    playSound('jump');
                }
            }

            // 3. 空中重力與硬直時間
            if (!player.isGrounded) {
                player.gravity = (player.vy < 0) ? PHYSICS.gravityUp : PHYSICS.gravityDown;
                player.vy += player.gravity;
                
                if (player.isBouncing) {
                    player.bounceTimer--;
                    if (player.bounceTimer <= 0) {
                        player.isBouncing = false;
                    }
                }
            }

            // 【動態風力套用修正】
            const wind = getWindForce();
            if (wind.x !== 0 || wind.y !== 0) {
                if (!player.isGrounded) {
                    // 空中受風影響 (包含 Y 軸上升氣流)
                    player.vx += wind.x;
                    player.vy += wind.y;
                } else if (!isBraking) {
                    // 地面沒煞車時，橫向風會推移玩家
                    if (wind.x !== 0) {
                        player.vx += wind.x * 2.91; 
                    }
                }
            }

            // 4. 運動預測與碰撞 (X 軸)
            player.x += player.vx;
            
            // 螢幕左右邊界碰撞
            if (player.x < 0) {
                player.x = 0;
                if (!player.isGrounded) {
                    player.vx = -player.vx * 0.6; 
                    player.facing = 'right';
                    player.isBouncing = true;
                    player.bounceTimer = 15;
                    playSound('bonk');
                } else {
                    player.vx = 0;
                }
            } else if (player.x + player.w > canvas.width) {
                player.x = canvas.width - player.w;
                if (!player.isGrounded) {
                    player.vx = -player.vx * 0.6; 
                    player.facing = 'left';
                    player.isBouncing = true;
                    player.bounceTimer = 15;
                    playSound('bonk');
                } else {
                    player.vx = 0;
                }
            }

            // 平台左右碰撞
            const currentPlatforms = screens[currentScreenIndex];
            for (let plat of currentPlatforms) {
                if (checkCollision(player, plat)) {
                    if (player.vx > 0) { 
                        player.x = plat.x - player.w;
                        if (!player.isGrounded) {
                            const bounceFactor = plat.isIce ? 0.8 : 0.5;
                            player.vx = -player.vx * bounceFactor; 
                            player.facing = 'left';
                            player.isBouncing = true;
                            player.bounceTimer = 15;
                            playSound('bonk');
                        } else {
                            player.vx = 0;
                        }
                    } else if (player.vx < 0) { 
                        player.x = plat.x + plat.w;
                        if (!player.isGrounded) {
                            const bounceFactor = plat.isIce ? 0.8 : 0.5;
                            player.vx = -player.vx * bounceFactor; 
                            player.facing = 'right';
                            player.isBouncing = true;
                            player.bounceTimer = 15;
                            playSound('bonk');
                        } else {
                            player.vx = 0;
                        }
                    }
                }
            }

            // 5. 運動預測與碰撞 (Y 軸)
            player.y += player.vy;
            let onPlatform = false;

            for (let plat of currentPlatforms) {
                if (checkCollision(player, plat)) {
                    // 往下掉落地面
                    if (player.vy > 0 && player.y + player.h - player.vy <= plat.y + 6) {
                        player.y = plat.y - player.h;
                        player.vy = 0;
                        
                        player.onIce = plat.isIce || false;

                        if (!player.onIce) {
                            player.vx = 0;
                        }
                        
                        if (!player.isGrounded) {
                            player.isGrounded = true;
                            player.isBouncing = false;
                            playSound('land');
                        }
                        onPlatform = true;
                    }
                    // 往上跳撞頭 (Bonk!)
                    else if (player.vy < 0 && player.y - player.vy >= plat.y + plat.h - 6) {
                        player.y = plat.y + plat.h;
                        player.vy = 0; 
                        player.vx = player.vx * 0.2; 
                        playSound('bonk');
                    }
                }
            }

            if (!onPlatform) {
                player.isGrounded = false;
                player.onIce = false; 
            }

            // 更新 ice 粒子生命週期
            for (let i = iceParticles.length - 1; i >= 0; i--) {
                const p = iceParticles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.life <= 0) {
                    iceParticles.splice(i, 1);
                }
            }

            // 6. 垂直切換螢幕機制
            if (player.y < 0) {
                if (currentScreenIndex < screens.length - 1) {
                    currentScreenIndex++;
                    player.y = canvas.height - player.h - 5;
                    updateUIFloor();
                } else {
                    player.y = 0;
                    player.vy = 0;
                }
            } else if (player.y > canvas.height) {
                if (currentScreenIndex > 0) {
                    currentScreenIndex--;
                    player.y = 5;
                    player.vx = player.vx * 0.5; 
                    totalFalls++;
                    document.getElementById('ui-falls').innerText = totalFalls;
                    playSound('fall');
                    updateUIFloor();
                } else {
                    player.y = canvas.height - player.h - 55; 
                    player.vy = 0;
                    player.vx = 0;
                    player.isGrounded = true;
                }
            }

            // 7. 偵測終點碰撞
            if (currentScreenIndex === screens.length - 1 && !isGameFinished) {
                const treasureRect = { x: treasure.x, y: treasure.y, w: treasure.w, h: treasure.h };
                if (checkCollision(player, treasureRect)) {
                    gameFinished();
                }
            }
        }

        function updateUIFloor() {
            document.getElementById('ui-floor').innerText = `${currentScreenIndex + 1} / ${screens.length}`;
        }

        // --- 繪製畫布元件 ---
        function draw() {
            let bgGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            if (currentScreenIndex < 3) {
                bgGradient.addColorStop(0, '#1e1b4b'); 
                bgGradient.addColorStop(1, '#0f172a');
            } else if (currentScreenIndex < 5) {
                bgGradient.addColorStop(0, '#0c4a6e'); 
                bgGradient.addColorStop(1, '#023e8a');
            } else if (currentScreenIndex < 8) {
                bgGradient.addColorStop(0, '#0f172a'); 
                bgGradient.addColorStop(1, '#115e59');
            } else {
                bgGradient.addColorStop(0, '#020617'); 
                bgGradient.addColorStop(1, '#1e1b4b');
            }
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 繪製背景風雪/強風粒子
            const wind = getWindForce();
            createParticles();
            particles.forEach((p, idx) => {
                if (wind.dir === 'left') {
                    p.vx = -3.5 - Math.random() * 2;
                    p.vy = (Math.random() - 0.5) * 0.2;
                } else if (wind.dir === 'right') {
                    p.vx = 3.5 + Math.random() * 2;
                    p.vy = (Math.random() - 0.5) * 0.2;
                } else if (wind.dir === 'up') {
                    p.vx = (Math.random() - 0.5) * 0.4;
                    p.vy = -3.5 - Math.random() * 2;
                } else {
                    p.vx = (Math.random() - 0.5) * 0.3;
                    p.vy = -Math.random() * 0.5 - 0.1;
                }

                p.x += p.vx;
                p.y += p.vy;
                
                if (wind.dir === 'left' && p.x < -20) {
                    p.x = canvas.width + 10;
                    p.y = Math.random() * canvas.height;
                } else if (wind.dir === 'right' && p.x > canvas.width + 20) {
                    p.x = -10;
                    p.y = Math.random() * canvas.height;
                } else if (wind.dir === 'up' && p.y < -20) {
                    p.y = canvas.height + 10;
                    p.x = Math.random() * canvas.width;
                } else if (p.y < 0 && wind.dir === 'none') {
                    particles.splice(idx, 1);
                } else {
                    if (p.isWindLine || wind.dir !== 'none') {
                        ctx.strokeStyle = wind.dir === 'up' ? `rgba(168, 85, 247, ${p.alpha})` : `rgba(165, 243, 252, ${p.alpha})`; 
                        ctx.lineWidth = p.size;
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        if (wind.dir === 'up') {
                            ctx.lineTo(p.x, p.y + 15 + Math.random() * 15);
                        } else if (wind.dir === 'right') {
                            ctx.lineTo(p.x - 15 - Math.random() * 15, p.y);
                        } else {
                            ctx.lineTo(p.x + 15 + Math.random() * 15, p.y);
                        }
                        ctx.stroke();
                    } else {
                        ctx.fillStyle = `rgba(226, 232, 240, ${p.alpha})`;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            });

            iceParticles.forEach(p => {
                ctx.fillStyle = `rgba(186, 230, 253, ${p.life / 40})`;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });

            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(80, 0, 320, canvas.height);

            const currentPlatforms = screens[currentScreenIndex];
            currentPlatforms.forEach(plat => {
                if (plat.isIce) {
                    let iceGrad = ctx.createLinearGradient(plat.x, plat.y, plat.x, plat.y + plat.h);
                    iceGrad.addColorStop(0, '#7dd3fc'); 
                    iceGrad.addColorStop(0.3, '#38bdf8');
                    iceGrad.addColorStop(1, '#0284c7'); 
                    ctx.fillStyle = iceGrad;
                    ctx.fillRect(plat.x, plat.y, plat.w, plat.h);

                    ctx.fillStyle = '#f0f9ff';
                    ctx.fillRect(plat.x, plat.y, plat.w, 4);

                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    for (let lx = plat.x + 15; lx < plat.x + plat.w; lx += 40) {
                        ctx.moveTo(lx, plat.y + 4);
                        ctx.lineTo(lx - 8, plat.y + plat.h - 4);
                    }
                    ctx.stroke();
                } else {
                    ctx.fillStyle = plat.color;
                    ctx.fillRect(plat.x, plat.y, plat.w, plat.h);

                    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                    ctx.fillRect(plat.x, plat.y, plat.w, 4);
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                    ctx.fillRect(plat.x, plat.y + plat.h - 4, plat.w, 4);
                }
            });

            if (currentScreenIndex === screens.length - 1) {
                drawTreasure();
            }

            drawPlayer();

            if (wind.dir !== 'none') {
                ctx.save();
                ctx.fillStyle = 'rgba(15, 23, 42, 0.7)';
                ctx.strokeStyle = wind.dir === 'up' ? 'rgba(168, 85, 247, 0.5)' : 'rgba(34, 211, 238, 0.5)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.roundRect(15, 15, 140, 30, 8);
                ctx.fill();
                ctx.stroke();

                const glow = Math.sin(Date.now() / 150) * 0.4 + 0.6;
                ctx.fillStyle = wind.dir === 'up' ? `rgba(192, 132, 252, ${glow})` : `rgba(239, 68, 68, ${glow})`;
                ctx.beginPath();
                ctx.arc(28, 30, 4, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = wind.dir === 'up' ? '#c084fc' : '#22d3ee';
                ctx.font = 'bold 11px sans-serif';
                
                let windText = '⚠️ 強風特報 ⬅️';
                if (wind.dir === 'right') windText = '⚠️ 強風特報 ➡️';
                if (wind.dir === 'up') windText = '⚠️ 上升氣流 ⬆️';
                
                ctx.fillText(windText, 42, 34);
                ctx.restore();
            }
        }

        function drawTreasure() {
            ctx.fillStyle = '#d97706'; 
            ctx.fillRect(treasure.x, treasure.y, treasure.w, treasure.h);
            
            ctx.fillStyle = '#b45309';
            ctx.fillRect(treasure.x - 2, treasure.y, treasure.w + 4, 12);
            
            ctx.fillStyle = '#f59e0b';
            ctx.fillRect(treasure.x + treasure.w / 2 - 5, treasure.y + 12, 10, 10);
            
            const pulse = Math.sin(Date.now() / 200) * 10 + 15;
            ctx.strokeStyle = 'rgba(251, 191, 36, 0.6)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(treasure.x + treasure.w / 2, treasure.y + treasure.h / 2, pulse, 0, Math.PI * 2);
            ctx.stroke();
        }

        function drawPlayer() {
            ctx.save();
            
            let drawX = player.x;
            let drawY = player.y;
            let drawW = player.w;
            let drawH = player.h;

            const isBraking = (keys.down || mobileDown) && player.isGrounded;

            if (player.isCharging) {
                const chargeRatio = player.chargeAmount / player.maxCharge;
                drawH = player.h - (12 * chargeRatio); 
                drawY = player.y + (12 * chargeRatio); 
                drawW = player.w + (4 * chargeRatio);  
                drawX = player.x - (2 * chargeRatio);
                
                drawX += (Math.random() - 0.5) * (2 * chargeRatio);
            } else if (isBraking) {
                drawH = player.h - 6; 
                drawY = player.y + 6; 
                drawW = player.w + 2;
                drawX = player.x - 1;
            }

            // 1. 騎士身體
            ctx.fillStyle = '#475569';
            ctx.fillRect(drawX, drawY, drawW, drawH);

            // 2. 騎士頭盔與面罩
            ctx.fillStyle = '#334155';
            ctx.fillRect(drawX + 2, drawY + 2, drawW - 4, 12);
            
            ctx.fillStyle = '#f1f5f9';
            if (player.facing === 'right') {
                ctx.fillRect(drawX + drawW - 10, drawY + 6, 8, 3);
                ctx.fillStyle = player.isCharging ? '#ef4444' : (isBraking ? '#f59e0b' : '#38bdf8'); 
                ctx.fillRect(drawX + drawW - 6, drawY + 6, 3, 3);
            } else {
                ctx.fillRect(drawX + 2, drawY + 6, 8, 3);
                ctx.fillStyle = player.isCharging ? '#ef4444' : (isBraking ? '#f59e0b' : '#38bdf8');
                ctx.fillRect(drawX + 3, drawY + 6, 3, 3);
            }

            // 3. 紅色帥氣斗篷 
            ctx.fillStyle = '#dc2626';
            const wind = getWindForce(); // 修正：在這裡定義 wind 變數，解決 ReferenceError 錯誤
            if (wind.dir === 'left' && player.isGrounded) {
                ctx.fillRect(drawX - 6, drawY + 12, 6, drawH - 14); 
            } else if (wind.dir === 'right' && player.isGrounded) {
                ctx.fillRect(drawX + drawW, drawY + 12, 6, drawH - 14); 
            } else if (!player.isGrounded) {
                if (player.vx > 0) {
                    ctx.fillRect(drawX - 6, drawY + 8, 8, drawH - 12);
                } else if (player.vx < 0) {
                    ctx.fillRect(drawX + drawW - 2, drawY + 8, 8, drawH - 12);
                } else {
                    ctx.fillRect(drawX - 2, drawY + 10, drawW + 4, 6);
                }
            } else {
                ctx.fillRect(drawX - 2, drawY + 12, 4, drawH - 14);
            }

            // 4. 手部與腳步
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(drawX + 3, drawY + drawH - 4, 5, 4);
            ctx.fillRect(drawX + drawW - 8, drawY + drawH - 4, 5, 4);

            // 5. 蓄力指示條
            if (player.isCharging) {
                const chargeRatio = player.chargeAmount / player.maxCharge;
                const barWidth = 32;
                const barHeight = 6;
                const barX = player.x + (player.w - barWidth) / 2;
                const barY = player.y - 12;

                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(barX, barY, barWidth, barHeight);

                let chargeColor = '#10b981'; 
                if (chargeRatio > 0.4 && chargeRatio <= 0.8) {
                    chargeColor = '#f59e0b'; 
                } else if (chargeRatio > 0.8) {
                    chargeColor = '#ef4444'; 
                }
                ctx.fillStyle = chargeColor;
                ctx.fillRect(barX + 1, barY + 1, (barWidth - 2) * chargeRatio, barHeight - 2);
            }

            ctx.restore();
        }

        function gameFinished() {
            isGameFinished = true;
            const finalTimeSeconds = Math.floor((Date.now() - gameStartTime) / 1000);
            
            document.getElementById('final-jumps').innerText = totalJumps;
            document.getElementById('final-falls').innerText = totalFalls;
            document.getElementById('final-time').innerText = `${finalTimeSeconds} 秒`;
            
            document.getElementById('victory-screen').classList.remove('hidden');
            playSound('victory');
        }

        document.getElementById('restart-btn').addEventListener('click', () => {
            player.x = 220;
            player.y = 550; 
            player.vx = 0;
            player.vy = 0;
            player.isGrounded = true;
            player.onIce = false;
            player.isCharging = false;
            player.chargeAmount = 0;
            
            totalJumps = 0;
            totalFalls = 0;
            currentScreenIndex = 0;
            gameStartTime = Date.now();
            isGameFinished = false;

            document.getElementById('ui-jumps').innerText = '0';
            document.getElementById('ui-falls').innerText = '0';
            updateUIFloor();
            document.getElementById('victory-screen').classList.add('hidden');
        });

        // --- 主遊戲循環 ---
        function loop() {
            updatePhysics();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
